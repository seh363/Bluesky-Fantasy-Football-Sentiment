name: Nightly NFL Sentiment Scraper

# 1. The Schedule
on:
  schedule:
    # This runs at 08:00 UTC every day (which is 2:00 AM / 3:00 AM or 4:00 AM depending on US time zones)
    - cron: '0 8 * * *'
  # This allows you to click a button on GitHub to run it manually whenever you want
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # This installs the required libraries before running your script
        run: pip install atproto vaderSentiment supabase pandas

      - name: Run Worker Script
        # This executes your Python file and securely passes in your passwords
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python worker.py
